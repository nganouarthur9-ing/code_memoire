<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GTA-IT Fintech — Mot de passe oublié</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #F5F7FA;
      --surface:  #FFFFFF;
      --border:   #E2E8F0;
      --primary:  #CC0000;
      --primary2: #990000;
      --accent:   #E53E3E;
      --green:    #059669;
      --dark:     #1A202C;
      --text:     #2D3748;
      --gray:     #718096;
      --gray2:    #CBD5E0;
      --mono:     'Space Mono', monospace;
      --sans:     'Syne', sans-serif;
    }
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(204,0,0,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(204,0,0,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.07;
      pointer-events: none;
    }
    .blob-1 { width:500px; height:500px; background:var(--primary); top:-150px; left:-150px; }
    .blob-2 { width:350px; height:350px; background:var(--primary); bottom:-80px; right:-80px; }

    .wrapper { position: relative; z-index: 10; width: 100%; max-width: 440px; padding: 0 1.5rem; }

    .logo { text-align: center; margin-bottom: 2.5rem; }
    .logo-mark { display: inline-flex; align-items: center; margin-bottom: 1rem; }
    .logo-gta { background: var(--primary); color: #fff; font-size: 2rem; font-weight: 800; padding: 0.3rem 0.7rem; border-radius: 6px 0 0 6px; letter-spacing: -0.02em; line-height: 1; }
    .logo-sep { background: var(--dark); color: #fff; font-size: 2rem; font-weight: 800; padding: 0.3rem 0.25rem; line-height: 1; }
    .logo-it  { background: var(--dark); color: #fff; font-size: 2rem; font-weight: 800; padding: 0.3rem 0.7rem; border-radius: 0 6px 6px 0; letter-spacing: -0.02em; line-height: 1; }
    .logo h1 { font-size: 0.95rem; font-weight: 600; color: var(--text); margin-top: 0.75rem; }
    .logo p { font-family: var(--mono); font-size: 0.68rem; color: var(--gray); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 0.3rem; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .card-bar { height: 4px; background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 100%); }
    .card-body { padding: 2.5rem; }

    .card-title { font-size: 1.25rem; font-weight: 800; color: var(--dark); margin-bottom: 0.3rem; }
    .card-sub { font-family: var(--mono); font-size: 0.72rem; color: var(--gray); margin-bottom: 2rem; line-height: 1.6; }

    .form-group { margin-bottom: 1.25rem; }
    label { display: block; font-family: var(--mono); font-size: 0.68rem; color: var(--text); letter-spacing: 0.08em; text-transform: uppercase; font-weight: 700; margin-bottom: 0.5rem; }
    input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 0.8rem 1rem; font-family: var(--mono); font-size: 0.85rem; color: var(--dark); outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(204,0,0,0.1); }
    input::placeholder { color: var(--gray2); }

    .btn { width: 100%; padding: 0.9rem; background: var(--primary); border: none; border-radius: 8px; font-family: var(--sans); font-size: 0.95rem; font-weight: 700; color: #fff; cursor: pointer; margin-top: 0.5rem; display:flex; align-items:center; justify-content:center; gap:0.5rem; transition: background 0.2s, transform 0.1s, box-shadow 0.2s; box-shadow: 0 4px 14px rgba(204,0,0,0.3); }
    .btn:hover { background: var(--primary2); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(204,0,0,0.35); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform:none; }

    .alert { border-radius: 8px; padding: 0.75rem 1rem; font-family: var(--mono); font-size: 0.75rem; margin-bottom: 1rem; display: none; line-height:1.5; }
    .alert-error   { background: rgba(204,0,0,0.06);  border: 1px solid rgba(204,0,0,0.2);  color: var(--primary); }
    .alert-success { background: rgba(5,150,105,0.06); border: 1px solid rgba(5,150,105,0.2); color: var(--green); }

    .footer-link { text-align: center; margin-top: 1.5rem; font-family: var(--mono); font-size: 0.72rem; color: var(--gray); }
    .footer-link a { color: var(--primary); text-decoration: none; font-weight: 700; }
    .footer-link a:hover { text-decoration: underline; }

    .spinner { display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="wrapper">
    <div class="logo">
      <div class="logo-mark">
        <span class="logo-gta">GTA</span><span class="logo-sep">-</span><span class="logo-it">IT</span>
      </div>
      <h1>Plateforme Fintech Sécurisée</h1>
      <p>IA · Blockchain · Détection de Fraude</p>
    </div>

    <div class="card">
      <div class="card-bar"></div>
      <div class="card-body">
        <div class="card-title">Mot de passe oublié ?</div>
        <div class="card-sub">Saisissez votre email et un lien de réinitialisation valable 30 minutes vous sera envoyé.</div>

        <div class="alert alert-error"   id="alertError"></div>
        <div class="alert alert-success" id="alertSuccess"></div>

        <form id="forgotForm">
          <div class="form-group">
            <label>Adresse Email</label>
            <input type="email" id="email" placeholder="vous@exemple.com" required />
          </div>
          <button type="submit" class="btn" id="submitBtn">
            <span id="btnText">Envoyer le lien</span>
            <div class="spinner" id="spinner"></div>
          </button>
        </form>

        <div class="footer-link">
          <a href="/">← Retour à la connexion</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn      = document.getElementById('submitBtn');
      const spinner  = document.getElementById('spinner');
      const btnText  = document.getElementById('btnText');
      const errEl    = document.getElementById('alertError');
      const okEl     = document.getElementById('alertSuccess');

      errEl.style.display = 'none';
      okEl.style.display  = 'none';
      btnText.style.display = 'none';
      spinner.style.display = 'block';
      btn.disabled = true;

      try {
        const res  = await fetch('/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('email').value.trim() })
        });
        const data = await res.json();

        okEl.textContent   = data.message || 'Si un compte existe, un email a été envoyé.';
        okEl.style.display = 'block';
        document.getElementById('forgotForm').reset();
      } catch (err) {
        errEl.textContent   = '⚠ Impossible de joindre le serveur.';
        errEl.style.display = 'block';
      } finally {
        btnText.style.display = 'block';
        spinner.style.display = 'none';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
